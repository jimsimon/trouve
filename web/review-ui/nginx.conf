server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'; frame-ancestors 'none'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location /v1/ {
        proxy_pass http://trouve-server:7433;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location = /github/webhooks {
        proxy_pass http://trouve-server:7433;
        proxy_http_version 1.1;
        client_max_body_size 2m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
