server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; connect-src 'self'; form-action 'none'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location /v1/ {
        proxy_pass http://trouve-server:7433;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 1h;
    }

    location = /github/webhooks {
        proxy_pass http://trouve-server:7433;
        proxy_http_version 1.1;
        client_max_body_size 2m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
