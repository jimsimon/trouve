name: Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit and integration tests (offline)
        run: cargo test --workspace
      - name: Build release binary
        run: cargo build --release

  # End-to-end tests that download the embedding model from Hugging Face.
  test-with-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-potion-code-16m
      - name: Model-backed end-to-end tests
        run: cargo test --workspace -- --ignored
        env:
          TROUVE_E2E: "1"

  # Numeric/behavioural parity against the upstream Python implementation.
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-potion-code-16m
      - name: Fetch upstream reference
        run: ./scripts/fetch-reference.sh
      - name: Install upstream semble
        run: pip install './reference/semble[mcp]'
      - name: Build release binary
        run: cargo build --release
      - name: Run parity harness
        run: python3 tests/parity/run_parity.py --binary target/release/trouve-search
