name: Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Every job only checks out, builds, tests, and caches.
permissions:
  contents: read

# Cancel superseded PR runs: they waste runner time and race the winners
# to save the same rust-cache key, which discards the losers' cache saves.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-target-${{ matrix.target }}
          cache-on-failure: true
          cache-bin: false
          save-if: ${{ github.event_name == 'push' }}
      - name: Unit and integration tests (offline)
        run: cargo test --workspace
      # Match the release job's package set and target on trusted main pushes.
      # Later tags can restore the release-profile dependency outputs.
      - name: Build and cache release artifacts
        if: github.ref == 'refs/heads/main'
        run: >-
          cargo build --locked --release
          --package trouve-server
          --package trouve-search
          --package trouve-app
          --target ${{ matrix.target }}

  # Windows-only dependencies and trait impls must be compiled on Windows.
  # Pull requests get a fast check; trusted main pushes build the exact release
  # package set and seed the cache used by a tag at the same commit.
  windows-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-target-x86_64-pc-windows-msvc
          cache-on-failure: true
          cache-bin: false
          save-if: ${{ github.event_name == 'push' }}
      - name: Check Windows desktop app
        if: github.event_name == 'pull_request'
        run: cargo check --package trouve-app --target x86_64-pc-windows-msvc
      - name: Build and cache Windows release artifacts
        if: github.ref == 'refs/heads/main'
        run: >-
          cargo build --locked --release
          --package trouve-server
          --package trouve-search
          --package trouve-app
          --target x86_64-pc-windows-msvc

  # Opt-in tests: model-backed trouve-search coverage plus loopback protocol
  # client coverage. These crates hold every #[ignore]d test in the workspace
  # (enforced by the "ignored tests" check in lint.yml); neither pulls in the
  # Slint/GUI crates, so this job needs no fontconfig/dbus apt packages.
  test-with-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cache embedding model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: hf-potion-code-16m
      - name: Model-backed end-to-end tests
        run: cargo test -p trouve-search -- --ignored
        env:
          TROUVE_E2E: "1"
      - name: Protocol client network tests
        run: cargo test -p trouve-client-core -- --ignored
        env:
          TROUVE_E2E: "1"

  # Numeric/behavioural parity against the upstream Python implementation.
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - name: Cache embedding model
        uses: actions/cache@v6
        with:
          path: ~/.cache/huggingface
          key: hf-potion-code-16m
      - name: Fetch upstream reference
        run: ./scripts/fetch-reference.sh
      - name: Install upstream semble
        # The parity harness imports bm25s directly. Keep its known-good
        # version explicit now that semble no longer depends on it.
        run: pip install './reference/semble[mcp]' 'bm25s==0.3.9'
      - name: Build release binary
        run: cargo build --release --package trouve-search
      - name: Run parity harness
        run: python3 crates/trouve-search/tests/parity/run_parity.py --binary target/release/trouve-search
