name: Release trouve-search

# The workspace versions crates independently, so release tags are
# per-crate: `trouve-search-v1.2.3` releases the search tool. (The legacy
# bare `v1.2.3` tags predate the monorepo conversion.) Fires whether the tag
# is pushed from the CLI or created by publishing a release from GitHub's
# release UI. Either way the run ends at the same place: a GitHub release
# for the tag with binaries attached.
on:
  push:
    tags: ["trouve-search-v[0-9]+.[0-9]+.[0-9]+*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release-trouve-search-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # A release tag must match the crate version, and every published npm
  # manifest must match the crate — one version everywhere, always.
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Manifests in sync and tag matches crate version
        run: |
          python3 scripts/sync_versions.py --check
          crate="$(python3 -c "import tomllib; print(tomllib.load(open('crates/trouve-search/Cargo.toml', 'rb'))['package']['version'])")"
          tag="${GITHUB_REF_NAME#trouve-search-v}"
          if [ "$tag" != "$crate" ]; then
            echo "Tag trouve-search-v$tag does not match crate version $crate" >&2
            exit 1
          fi

  build:
    needs: verify-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc): native builds on x64 and arm64 runners.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Linux (musl, fully static): built with `cross`, whose images ship
          # the musl C/C++ toolchains needed by the native deps (tree-sitter
          # grammars, oniguruma, esaxx).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # macOS: arm64 native; x64 cross-compiled from the arm64 runner
          # (first-class in Apple's toolchain).
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Windows: x64 and arm64, each built natively.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --package trouve-search --target ${{ matrix.target }}
      # Artifact names keep the historical `trouve-search-vX.Y.Z-<target>`
      # shape: strip the crate prefix from the tag to recover `vX.Y.Z`.
      - name: Package (unix)
        if: runner.os != 'Windows'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version_ref="v${REF_NAME#trouve-search-v}"
          cd target/${{ matrix.target }}/release
          tar czf "trouve-search-${version_ref}-${{ matrix.target }}.tar.gz" trouve-search
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $versionRef = "v" + $env:REF_NAME.Substring("trouve-search-v".Length)
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path trouve-search.exe -DestinationPath "trouve-search-$versionRef-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: trouve-search-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/trouve-search-*.tar.gz
            target/${{ matrix.target }}/release/trouve-search-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
      # Attaches to the existing release when one was published from the UI;
      # creates the release when the run came from a pushed tag.
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true

  publish-containers:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: server
            context: .
            dockerfile: Dockerfile.server
            image: trouve-server
          - component: review-ui
            context: web/review-ui
            dockerfile: web/review-ui/Dockerfile
            image: trouve-review-ui
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Resolve release version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF_NAME#trouve-search-v}" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,format=long
      - name: Build and publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  # Mutable tags reconcile separately from release-scoped immutable builds.
  # GitHub may coalesce pending jobs in this shared group; that is safe because
  # every publisher starts after both versioned images exist and revalidates
  # releases/latest while holding the global publisher slot.
  publish-latest-containers:
    needs: publish-containers
    runs-on: ubuntu-latest
    concurrency:
      group: release-trouve-search-latest-containers
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Publish current release as latest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ github.ref_name }}
        run: |
          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [ "$latest_tag" != "$GITHUB_REF_NAME" ]; then
            exit 0
          fi
          version="${VERSION#trouve-search-v}"
          for image in trouve-server trouve-review-ui; do
            docker buildx imagetools create \
              --tag "${IMAGE_PREFIX}/${image}:latest" \
              "${IMAGE_PREFIX}/${image}:${version}"
          done

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --package trouve-search
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish platform packages, @trouve-ai/search-core, then search-plugin.
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # npm provenance attestations are signed with the job's OIDC token.
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Stage platform binaries
        run: python3 scripts/stage_npm_binaries.py artifacts
      - name: Publish npm packages
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publishes." >&2
            exit 0
          fi
          publish_if_new() {
            local dir="$1"
            local name version
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            if [ "$(npm view "$name@$version" version 2>/dev/null)" = "$version" ]; then
              echo "$name@$version already published; skipping."
              return
            fi
            echo "Publishing $name@$version from $dir"
            (cd "$dir" && npm publish --access public --provenance)
          }
          shopt -s nullglob
          for pkg in npm/search-*/package.json; do
            dir="$(dirname "$pkg")"
            case "$dir" in
              npm/search-core|npm/search-plugin) continue ;;
            esac
            publish_if_new "$dir"
          done
          publish_if_new npm/search-core
          publish_if_new npm/search-plugin
