name: Release

# Fires when a semantic tag (v1.2.3, v1.2.3-rc.1, ...) reaches the repo —
# whether pushed from the CLI or created by publishing a release from
# GitHub's release UI (which pushes the tag too). Either way the run ends at
# the same place: a GitHub release for the tag with binaries attached.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # A release tag must match the crate version, and every published npm
  # manifest must match the crate — one version everywhere, always.
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Manifests in sync and tag matches crate version
        run: |
          python3 scripts/sync_versions.py --check
          crate="$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['package']['version'])")"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$tag" != "$crate" ]; then
            echo "Tag v$tag does not match Cargo.toml version $crate" >&2
            exit 1
          fi

  build:
    needs: verify-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc): native builds on x64 and arm64 runners.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Linux (musl, fully static): built with `cross`, whose images ship
          # the musl C/C++ toolchains needed by the native deps (tree-sitter
          # grammars, oniguruma, esaxx).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # macOS: arm64 native; x64 cross-compiled from the arm64 runner
          # (first-class in Apple's toolchain).
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Windows: x64 and arm64, each built natively.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf trouve-search-${{ github.ref_name }}-${{ matrix.target }}.tar.gz trouve-search
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path trouve-search.exe -DestinationPath trouve-search-${{ github.ref_name }}-${{ matrix.target }}.zip
      - uses: actions/upload-artifact@v7
        with:
          name: trouve-search-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/trouve-search-*.tar.gz
            target/${{ matrix.target }}/release/trouve-search-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS
      # Attaches to the existing release when one was published from the UI;
      # creates the release when the run came from a pushed tag.
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true

  publish-crate:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish platform packages, @trouve-ai/search-core, then search-plugin.
  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # npm provenance attestations are signed with the job's OIDC token.
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Stage platform binaries
        run: python3 scripts/stage_npm_binaries.py artifacts
      - name: Publish npm packages
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publishes." >&2
            exit 0
          fi
          publish_if_new() {
            local dir="$1"
            local name version
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            if [ "$(npm view "$name@$version" version 2>/dev/null)" = "$version" ]; then
              echo "$name@$version already published; skipping."
              return
            fi
            echo "Publishing $name@$version from $dir"
            (cd "$dir" && npm publish --access public --provenance)
          }
          shopt -s nullglob
          for pkg in npm/search-*/package.json; do
            dir="$(dirname "$pkg")"
            case "$dir" in
              npm/search-core|npm/search-plugin) continue ;;
            esac
            publish_if_new "$dir"
          done
          publish_if_new npm/search-core
          publish_if_new npm/search-plugin
