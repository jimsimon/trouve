name: Release

# Every first-party artifact uses the root workspace version, and repository
# releases use `vX.Y.Z`. The workflow publishes the desktop and server
# binaries, search packages, and review containers; all workspace package
# versions advance together.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  # A manual run can repair the binary assets on an existing release without
  # republishing immutable crates, npm packages, or container images.
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z release tag to rebuild
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

permissions:
  # Build and verification jobs only need to read repository contents.
  contents: read

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # The release tag and every first-party manifest must match the canonical
  # root workspace version — one version everywhere, always.
  verify-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.11.9"
      - name: Manifests in sync and tag matches workspace version
        run: |
          python3 scripts/sync_versions.py --check
          workspace="$(python3 -c "import tomllib; print(tomllib.load(open('Cargo.toml', 'rb'))['workspace']['package']['version'])")"
          if [ "$RELEASE_TAG" != "v$workspace" ]; then
            echo "Tag $RELEASE_TAG does not match workspace version $workspace" >&2
            exit 1
          fi

  build_binaries:
    name: Build headless binaries (${{ matrix.target }})
    needs: verify-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc): native builds on x64 and arm64 runners.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Linux (musl, fully static): built with `cross`, whose images ship
          # the musl C/C++ toolchains needed by the native deps (tree-sitter
          # grammars, oniguruma, esaxx).
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          # macOS: arm64 native; x64 cross-compiled from the arm64 runner
          # (first-class in Apple's toolchain).
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Windows: x64 and arm64, each built natively.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-binaries-${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2
        with:
          tool: cross
      - name: Build trouve-server
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --package trouve-server --target ${{ matrix.target }}
      # Manual runs backfill only missing binaries. Existing search assets
      # stay byte-for-byte unchanged.
      - name: Build trouve-search
        if: github.event_name == 'push'
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --package trouve-search --target ${{ matrix.target }}
      - name: Package trouve-server (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "trouve-server-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" trouve-server
      - name: Package trouve-server (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path trouve-server.exe -DestinationPath "trouve-server-$env:RELEASE_TAG-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trouve-server-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/trouve-server-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/trouve-server-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip
          if-no-files-found: error
      # Search artifact names keep the historical
      # `trouve-search-vX.Y.Z-<target>` shape.
      - name: Package trouve-search (unix)
        if: github.event_name == 'push' && runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "trouve-search-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" trouve-search
      - name: Package trouve-search (windows)
        if: github.event_name == 'push' && runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path trouve-search.exe -DestinationPath "trouve-search-$env:RELEASE_TAG-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: github.event_name == 'push'
        with:
          name: trouve-search-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/trouve-search-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/trouve-search-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip
          if-no-files-found: error

  build_app:
    name: Build trouve (${{ matrix.target }})
    needs: verify-versions
    strategy:
      fail-fast: false
      matrix:
        include:
          # The desktop app uses system GUI libraries on Linux, so it ships
          # for glibc rather than the static search-only musl targets.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # Apple's toolchain supports cross-compiling x64 from the native
          # arm64 runner.
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          # Both Windows targets build on matching native hardware.
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - name: Install Linux native build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-app-${{ matrix.target }}
      - name: Build
        run: cargo build --release --package trouve-app --target ${{ matrix.target }}
      - name: Package trouve (unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "trouve-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" trouve
      - name: Package trouve (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path trouve.exe -DestinationPath "trouve-$env:RELEASE_TAG-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trouve-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/trouve-${{ env.RELEASE_TAG }}-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/trouve-${{ env.RELEASE_TAG }}-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    needs: [build_binaries, build_app]
    runs-on: ubuntu-latest
    permissions:
      # softprops/action-gh-release uploads assets to the repository release.
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Download existing search assets for backfill checksums
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          search_asset_count="$(gh release view "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '[.assets[].name | select(startswith("trouve-search-"))] | length')"
          if [ "$search_asset_count" -gt 0 ]; then
            gh release download "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --dir existing-artifacts \
              --pattern 'trouve-search-*'
          fi
      - name: Generate checksums
        run: |
          checksum_file="$(mktemp)"
          (
            cd artifacts
            sha256sum *
            if [ -d ../existing-artifacts ]; then
              cd ../existing-artifacts
              sha256sum *
            fi
          ) | sort -k2 > "$checksum_file"
          mv "$checksum_file" artifacts/SHA256SUMS
      # Attaches to the existing release when one was published from the UI;
      # creates the release when the run came from a pushed tag.
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: artifacts/*
          # Existing release notes are user-authored state. Manual backfills
          # only attach assets; tag-triggered releases still generate notes.
          generate_release_notes: ${{ github.event_name == 'push' }}

  publish-containers:
    needs: release
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    permissions:
      # Checkout reads repository contents; image publication writes GHCR packages.
      contents: read
      packages: write
    strategy:
      fail-fast: false
      # Build on matching native hardware; the manifest job below joins the
      # architecture-specific images under the public version and SHA tags.
      matrix:
        include:
          - component: server
            context: .
            dockerfile: Dockerfile.server
            image: trouve-server
            runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - component: server
            context: .
            dockerfile: Dockerfile.server
            image: trouve-server
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
          - component: review-ui
            context: web/review-ui
            dockerfile: web/review-ui/Dockerfile
            image: trouve-review-ui
            runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - component: review-ui
            context: web/review-ui
            dockerfile: web/review-ui/Dockerfile
            image: trouve-review-ui
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Resolve release version
        id: version
        shell: bash
        run: echo "value=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.value }}-${{ matrix.arch }}
            type=raw,value=sha-${{ github.sha }}-${{ matrix.arch }}
      - name: Build and publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}-${{ matrix.arch }}

  publish-container-manifests:
    needs: publish-containers
    runs-on: ubuntu-latest
    permissions:
      # Required to read architecture images and publish manifests in GHCR.
      packages: write
    strategy:
      matrix:
        image: [trouve-server, trouve-review-ui]
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Publish multi-platform manifests
        shell: bash
        env:
          IMAGE: ${{ matrix.image }}
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
          SHA_TAG: sha-${{ github.sha }}
        run: |
          version="${RELEASE_TAG#v}"
          for tag in "$version" "$SHA_TAG"; do
            docker buildx imagetools create \
              --tag "${IMAGE_PREFIX}/${IMAGE}:${tag}" \
              "${IMAGE_PREFIX}/${IMAGE}:${tag}-amd64" \
              "${IMAGE_PREFIX}/${IMAGE}:${tag}-arm64"
          done

  # Mutable tags reconcile separately from release-scoped immutable builds.
  # GitHub may coalesce pending jobs in this shared group; that is safe because
  # every publisher starts after both multi-platform versioned images exist and
  # revalidates releases/latest while holding the global publisher slot.
  publish-latest-containers:
    needs: publish-container-manifests
    runs-on: ubuntu-latest
    concurrency:
      group: release-latest-containers
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      - name: Publish current release as latest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}
        run: |
          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          if [ "$latest_tag" != "$RELEASE_TAG" ]; then
            exit 0
          fi
          version="${RELEASE_TAG#v}"
          for image in trouve-server trouve-review-ui; do
            docker buildx imagetools create \
              --tag "${IMAGE_PREFIX}/${image}:latest" \
              "${IMAGE_PREFIX}/${image}:${version}"
          done

  publish-crate:
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --package trouve-search
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish platform packages, @trouve-ai/search-core, then search-plugin.
  publish-npm:
    needs: release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # npm provenance attestations are signed with the job's OIDC token.
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Stage platform binaries
        run: python3 scripts/stage_npm_binaries.py artifacts
      - name: Publish npm packages
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is not configured; skipping npm publishes." >&2
            exit 0
          fi
          publish_if_new() {
            local dir="$1"
            local name version
            name="$(node -p "require('./$dir/package.json').name")"
            version="$(node -p "require('./$dir/package.json').version")"
            if [ "$(npm view "$name@$version" version 2>/dev/null)" = "$version" ]; then
              echo "$name@$version already published; skipping."
              return
            fi
            echo "Publishing $name@$version from $dir"
            (cd "$dir" && npm publish --access public --provenance)
          }
          shopt -s nullglob
          for pkg in npm/search-*/package.json; do
            dir="$(dirname "$pkg")"
            case "$dir" in
              npm/search-core|npm/search-plugin) continue ;;
            esac
            publish_if_new "$dir"
          done
          publish_if_new npm/search-core
          publish_if_new npm/search-plugin
