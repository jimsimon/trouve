name: Lint

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: versions in sync
        run: python3 scripts/sync_versions.py --check
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: npm/package-lock.json
      # npm/ is an npm workspace; one install links the local packages
      # (search-plugin -> search-core) and installs all dev dependencies.
      # `npm install` rather than `npm ci`: search-core's optional platform
      # packages aren't in the lockfile until they exist on the registry, and
      # `npm ci` refuses to run with an incomplete lockfile.
      - name: npm typecheck
        working-directory: npm
        run: |
          npm install
          npm run typecheck
