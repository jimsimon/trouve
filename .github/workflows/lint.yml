name: Lint

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# The lint job only checks out and reads code.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux native build dependencies
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: versions in sync
        run: python3 scripts/sync_versions.py --check
      # The test-with-model job in test.yml only compiles trouve-search, so
      # an #[ignore]d test anywhere else would silently never run in CI.
      # Keep them all in trouve-search, or widen that job's scope on purpose.
      # Matches bare #[ignore] and #[cfg_attr(..., ignore)] forms; a comment
      # or string that happens to match fails loudly here, which is cheap to
      # fix, unlike a silently skipped test.
      - name: ignored tests live in trouve-search
        run: |
          if grep -rlnE '#\[(cfg_attr\(.*,[[:space:]]*)?ignore\b' crates --include='*.rs' | grep -v '^crates/trouve-search/'; then
            echo "Found #[ignore]d tests outside crates/trouve-search — update the test-with-model job in test.yml or move the test" >&2
            exit 1
          fi
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: npm/package-lock.json
      # npm/ is an npm workspace; one install links the local packages
      # (search-plugin -> search-core) and installs all dev dependencies.
      # `npm install` rather than `npm ci`: search-core's optional platform
      # packages aren't in the lockfile until they exist on the registry, and
      # `npm ci` refuses to run with an incomplete lockfile.
      - name: npm typecheck
        working-directory: npm
        run: |
          npm install
          npm run typecheck
