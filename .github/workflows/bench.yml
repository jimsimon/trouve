name: Bench

# Benchmarks with regression gating: every run is compared against the
# baseline recorded from the last push to main (kept in the actions cache),
# and the job fails when a benchmark regresses past the alert threshold.
# PRs only compare; pushes to main update the baseline.

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

# Serialize baseline updates on main so concurrent pushes cannot race the
# benchmark cache.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Criterion micro-benchmarks: chunking, BM25 build/query, dense query.
  # The least noisy signal, so it gets the tighter threshold.
  micro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run criterion benchmarks
        # Clear stale criterion state (rust-cache persists ./target) so the
        # converter only sees estimates from this run.
        run: rm -rf target/criterion && cargo bench --bench index_and_search
      - name: Convert criterion estimates to benchmark JSON
        run: python3 benchmarks/to_gha_bench.py --criterion target/criterion > micro.json
      - name: Restore baseline
        uses: actions/cache/restore@v4
        with:
          path: bench-baseline
          key: bench-micro-${{ github.sha }}
          restore-keys: bench-micro-
      - name: Compare against baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: micro-benchmarks
          tool: customSmallerIsBetter
          output-file-path: micro.json
          external-data-json-path: bench-baseline/micro.json
          fail-on-alert: true
          alert-threshold: "150%"
          summary-always: true
          save-data-file: ${{ github.ref == 'refs/heads/main' }}
          max-items-in-chart: 50
      - name: Save baseline (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: bench-baseline
          key: bench-micro-${{ github.sha }}

  # End-to-end CLI benchmarks on a pinned flask checkout: cold index, warm
  # query, incremental reindex, and the non-git (filesystem manifest) warm
  # path. Wall-clock times on shared runners are noisier, hence the looser
  # threshold and median-based comparison.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine
      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-potion-code-16m
      - name: Build release binary
        run: cargo build --release
      - name: Run end-to-end benchmarks
        run: benchmarks/run_ci_bench.sh bench-out
      - name: Restore baseline
        uses: actions/cache/restore@v4
        with:
          path: bench-baseline
          key: bench-e2e-${{ github.sha }}
          restore-keys: bench-e2e-
      - name: Compare against baseline
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: e2e-benchmarks
          tool: customSmallerIsBetter
          output-file-path: bench-out/e2e.json
          external-data-json-path: bench-baseline/e2e.json
          fail-on-alert: true
          alert-threshold: "175%"
          summary-always: true
          save-data-file: ${{ github.ref == 'refs/heads/main' }}
          max-items-in-chart: 50
      - name: Save baseline (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/cache/save@v4
        with:
          path: bench-baseline
          key: bench-e2e-${{ github.sha }}
