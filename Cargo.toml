[package]
name = "trouve"
version = "1.0.0"
edition = "2021"
description = "Fast and accurate code search for agents. Rust port of MinishLab/semble with incremental, branch- and worktree-aware indexing."
license = "MIT"
repository = "https://github.com/jimsimon/trouve"
keywords = ["code-search", "semantic-search", "mcp", "agent", "embeddings"]
categories = ["command-line-utilities", "development-tools"]
# 1.89 for std file locking (`File::lock`), used by the clone cache
# (1.87 was already required for `usize::is_multiple_of`).
rust-version = "1.89"

[lib]
name = "trouve"
path = "src/lib.rs"

[[bin]]
name = "trouve"
path = "src/main.rs"

[dependencies]
ahash = "0.8"
anyhow = "1.0.103"
bincode = { version = "2", features = ["serde"] }
blake3 = "1.8.5"
bytemuck = { version = "1.25.0", features = ["derive"] }
clap = { version = "4.6.1", features = ["derive"] }
dirs = "6.0.0"
half = "2"
hf-hub = { version = "0.4", default-features = false, features = ["ureq"] }
ignore = "0.4.27"
memmap2 = "0.9.11"
rayon = "1.12.0"
regex = "1.12.4"
safetensors = "0.5"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.150", features = ["preserve_order"] }
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
tree-sitter = "0.26.10"
tree-sitter-bash = "0.25.1"
tree-sitter-c = "0.24.2"
tree-sitter-c-sharp = "0.23.5"
tree-sitter-cmake = "0.7.1"
tree-sitter-cpp = "0.23.4"
tree-sitter-css = "0.25.0"
tree-sitter-d = "0.8.2"
tree-sitter-dart = "0.2.0"
tree-sitter-elixir = "0.3.5"
tree-sitter-elm = "5.9.0"
tree-sitter-embedded-template = "0.25.0"
tree-sitter-erlang = "0.19.0"
tree-sitter-fortran = "0.6.0"
tree-sitter-gleam = "1.0.0"
tree-sitter-go = "0.25.0"
tree-sitter-graphql = "0.1.0"
tree-sitter-groovy = "0.1.2"
tree-sitter-haskell = "0.23.1"
tree-sitter-hcl = "1.1.0"
tree-sitter-html = "0.23.2"
tree-sitter-java = "0.23.5"
tree-sitter-javascript = "0.25.0"
tree-sitter-json = "0.24.8"
tree-sitter-julia = "0.23.1"
tree-sitter-kotlin-ng = "1.1.0"
tree-sitter-lua = "0.5.0"
tree-sitter-make = "1.1.1"
tree-sitter-md = "0.5.3"
tree-sitter-nix = "0.3.0"
tree-sitter-objc = "3.0.2"
tree-sitter-ocaml = "0.25.0"
tree-sitter-perl = "1.1.2"
tree-sitter-php = "0.24.2"
tree-sitter-powershell = "0.26.4"
tree-sitter-proto = "0.4.0"
tree-sitter-python = "0.25.0"
tree-sitter-r = "1.3.0"
tree-sitter-ruby = "0.23.1"
tree-sitter-rust = "0.24.2"
tree-sitter-scala = "0.26.0"
tree-sitter-sequel = "0.3.11"
tree-sitter-solidity = "1.2.13"
tree-sitter-svelte-ng = "1.0.2"
tree-sitter-swift = "0.7.3"
tree-sitter-toml-ng = "0.7.0"
tree-sitter-typescript = "0.23.2"
tree-sitter-xml = "0.7.0"
tree-sitter-yaml = "0.7.2"
tree-sitter-zig = "1.1.2"

[target.'cfg(unix)'.dependencies]
libc = "0.2.186"

[dev-dependencies]
criterion = "0.8.2"
filetime = "0.2"
model2vec-rs = "0.2.1"
proptest = "1.11.0"
tempfile = "3.27.0"

[[bench]]
name = "index_and_search"
harness = false

[profile.release]
lto = "thin"
codegen-units = 1
